<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="./iconapp.png">

<title>DBMS Query Runner</title>

<style>
body {
  background:#0f1117;
  color:#e2e8f0;
  font-family:Segoe UI;
  padding:40px;
}

.container{
  max-width:800px;
  margin:auto;
}

textarea{
  width:100%;
  height:120px;
  background:#1e2130;
  color:white;
  border:none;
  padding:10px;
  margin-bottom:10px;
}

button{
  padding:10px 20px;
  background:#6366f1;
  color:white;
  border:none;
  margin-right:10px;
  cursor:pointer;
}

select,input{
  padding:10px;
  margin:10px 0;
  width:100%;
  background:#1e2130;
  color:white;
  border:none;
}

.output{
  background:#1e2130;
  padding:15px;
  margin-top:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>SQL Query Runner</h2>

<textarea id="query" placeholder="SELECT * FROM Students"></textarea>
<button onclick="runQuery()">Execute</button>

<hr>

<h2>CSV Upload</h2>

<select id="table">
<option value="Students">Students</option>
<option value="Advisers">Advisers</option>
<option value="Courses">Courses</option>
<option value="Residence_Staff">Residence_Staff</option>
<option value="Halls">Halls</option>
<option value="Hall_Rooms">Hall_Rooms</option>
<option value="Apartments">Apartments</option>
<option value="Apartment_Rooms">Apartment_Rooms</option>
<option value="Leases">Leases</option>
<option value="Invoices">Invoices</option>
<option value="Apartment_Inspections">Apartment_Inspections</option>
<option value="Next_of_Kin">Next_of_Kin</option>
</select>

<input type="file" id="csvFile" />

<button onclick="uploadCSV()">Upload CSV</button>

<div class="output" id="output">Output will appear here...</div>

</div>

<script>

async function runQuery(){
  const query=document.getElementById("query").value;

  const res=await fetch("/query",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({query})
  });

  const data=await res.json();
  document.getElementById("output").innerText=JSON.stringify(data,null,2);
}

async function uploadCSV(){

  const file=document.getElementById("csvFile").files[0];
  const table=document.getElementById("table").value;

  if(!file){
    alert("Select CSV file");
    return;
  }

  const formData=new FormData();
  formData.append("file",file);

  document.getElementById("output").innerText="Uploading...";

  const res=await fetch(`/upload-csv/${table}`,{
    method:"POST",
    body:formData
  });

  const data=await res.json();
  document.getElementById("output").innerText=JSON.stringify(data,null,2);
}

</script>

</body>
</html>
